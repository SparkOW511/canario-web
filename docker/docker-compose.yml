services:
  canario:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: canario
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.canario.rule=Host(`canario.borstnar.com`)"
      - "traefik.http.routers.canario.entrypoints=websecure"
      - "traefik.http.routers.canario.tls.certresolver=letsencrypt"
      - "traefik.http.services.canario.loadbalancer.server.port=80"

networks:
  default:
    external: true
    name: traefik
